<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scottish Nature Data</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0f2b1d; --paper:#eef5f0; --accent:#24824d; --accent-light:#dcede3;
  --mid:#597866; --rule:#b5cfc1; --field-bg:#ffffff; --field-border:#9dbfae;
  --success:#176b32; --success-light:#e2f0e6;
  --warning:#b85c00; --warning-light:#fef3e5;
  --unfav:#9e3a00; --unfav-light:#fef0e8;
  --unfav-decline:#c22929;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --sans:'Söhne','Helvetica Neue','Arial',sans-serif;
  --display:'Georgia','Times New Roman',serif;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}

.hero{background:linear-gradient(135deg, var(--ink) 0%, var(--accent) 100%);color:var(--paper);padding:4rem 2rem;border-radius:0 0 2rem 2rem;margin-bottom:3rem;display:flex;flex-wrap:wrap;gap:2rem;align-items:center;justify-content:space-between;box-shadow:0 10px 30px rgba(15,43,29,0.15)}
.hero-text{max-width:600px}
.hero-title{font-family:var(--display);font-size:3rem;font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:.5rem}
.hero-sub{font-size:1rem;color:var(--accent-light);letter-spacing:.05em;text-transform:uppercase;font-weight:600}

.frame{max-width:1120px;margin:0 auto;padding:0 2rem 4rem}
.data-section{background:var(--field-bg);border:1px solid var(--rule);border-radius:1rem;padding:2.5rem;margin-bottom:2.5rem;box-shadow:0 4px 20px rgba(15,43,29,0.04)}
.section-header{margin-bottom:2rem;border-bottom:2px solid var(--accent-light);padding-bottom:1rem}
.section-title{font-family:var(--display);font-size:1.8rem;color:var(--ink)}

/* Unified Global Controls */
.global-controls{background:var(--ink);color:var(--paper);padding:2rem;border-radius:1rem;margin-bottom:2.5rem;display:grid;grid-template-columns:220px auto 1fr 1fr 1fr;gap:1.5rem;align-items:end}
.field-group{display:flex;flex-direction:column;gap:.5rem}
.field-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent-light);font-weight:600}
.field-input{font-family:var(--mono);font-size:.85rem;padding:.65rem .75rem;border:none;background:var(--field-bg);color:var(--ink);outline:none;width:100%;border-radius:4px}
.btn-search{font-family:var(--sans);font-size:.75rem;font-weight:700;text-transform:uppercase;padding:.65rem 1.2rem;border:none;background:var(--accent);color:var(--paper);cursor:pointer;border-radius:0 4px 4px 0}
.field-row{display:flex}
.field-row .field-input{border-radius:4px 0 0 4px}

.status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;min-height:1.5rem;border-bottom:1px solid var(--rule);padding-bottom:0.5rem}
.status-text{font-size:.75rem;color:var(--mid);font-family:var(--mono)}
.status-count{font-size:.7rem;font-family:var(--mono);color:var(--mid)}

.site-list{display:flex;flex-direction:column;gap:4px}
.site-row{border:1px solid var(--rule);background:var(--field-bg);border-radius:6px;cursor:pointer;transition:all .1s;overflow:hidden}
.site-row:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(36,130,77,0.1)}
.site-header{display:grid;grid-template-columns:1fr auto auto;gap:1.5rem;align-items:center;padding:.85rem 1.2rem}
.site-name{font-weight:700;font-size:.9rem}
.site-distance{font-family:var(--mono);color:var(--mid);font-size:.75rem}
.desig-tag{font-size:.6rem;font-weight:700;padding:.2rem .4rem;background:var(--paper);border:1px solid var(--rule);border-radius:3px;margin-left:0.5rem}

.site-condition-summary{font-size:.65rem;font-weight:700;text-transform:uppercase;padding:.2rem .6rem;border-radius:3px}
.cond-fav{background:var(--success-light);color:var(--success)}
.cond-unfav-rec{background:var(--warning-light);color:var(--warning)}
.cond-unfav{background:var(--unfav-light);color:var(--unfav)}
.cond-unfav-dec{background:#fbe8e8;color:var(--unfav-decline)}
.cond-unknown{background:var(--paper);color:var(--mid)}

.site-detail{display:none;border-top:1px solid var(--rule);padding:1.5rem 1.2rem;background:#fcfdfc}
.site-row.open .site-detail{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:2rem}
.detail-label{font-size:.6rem;text-transform:uppercase;color:var(--mid);font-weight:700;border-bottom:1px solid var(--accent-light);display:block;margin-bottom:0.5rem}

table{width:100%;border-collapse:collapse;font-size:.75rem}
th{text-align:left;padding:.5rem;border-bottom:1px solid var(--rule);color:var(--mid)}
td{padding:.65rem .5rem;border-bottom:1px solid #f0f4f2}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--rule);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem}

@media(max-width:900px){ .global-controls{grid-template-columns:1fr 1fr} .field-group:first-child{grid-column:1/-1} }
</style>
</head>
<body>

  <header class="hero">
    <div class="hero-text">
      <h1 class="hero-title">Scottish Nature Data</h1>
      <span class="hero-sub">Environmental information for your local area</span>
    </div>
  </header>

  <main class="frame">
    
    <div class="global-controls">
      <div class="field-group">
        <label class="field-label">Postcode Search</label>
        <div class="field-row">
          <input type="text" id="postcode" class="field-input" placeholder="e.g. EH1 1RF">
          <button class="btn-search" id="btn-search">Find</button>
        </div>
      </div>
      <div class="field-group" style="align-self:center"><span class="field-label" style="opacity:0.5;text-align:center">OR</span></div>
      <div class="field-group"><label class="field-label">Local Authority</label><select id="dd-uta" class="field-input"><option value="">— All —</option></select></div>
      <div class="field-group"><label class="field-label">Constituency</label><select id="dd-spc" class="field-input"><option value="">— All —</option></select></div>
      <div class="field-group"><label class="field-label">Region</label><select id="dd-spe" class="field-input"><option value="">— All —</option></select></div>
    </div>

    <section class="data-section">
      <header class="section-header"><h2 class="section-title">Protected areas</h2></header>
      <div class="status-bar">
        <span class="status-text" id="pa-status">Enter a location to see sites...</span>
        <span class="status-count" id="pa-count"></span>
      </div>
      <div id="pa-results"></div>
    </section>

    <section class="data-section">
      <header class="section-header"><h2 class="section-title">Other nature designations</h2></header>
      <div class="status-bar">
        <span class="status-text" id="od-status"></span>
        <span class="status-count" id="od-count"></span>
      </div>
      <div id="od-results"></div>
    </section>

  </main>

<script>
const CONFIG = {
  MAPIT_API_KEY: "ELNTpDEh11ZUqJUj21zLAmKSWsBOCVSiSniMPIu6",
  MAPIT_BASE: "https://mapit.mysociety.org",
  DATA_DIR: "data/",
  FILES: { 
    siteData: "site_data.json", metadata: "metadata.json", 
    regions: "regions.json", sites: "sites.json", 
    pressures: "pressures.json", otherDesignations: "other_designations.geojson"
  },
  PROXIMITY_KM: 10
};

let STATE = { 
  siteData: null, metadata: null, regions: null, 
  sites: null, pressures: null, otherDesignations: null 
};

const $ = s => document.querySelector(s);
const EL = {
  postcode: $("#postcode"), btnSearch: $("#btn-search"),
  ddUTA: $("#dd-uta"), ddSPC: $("#dd-spc"), ddSPE: $("#dd-spe"),
  paStatus: $("#pa-status"), paCount: $("#pa-count"), paResults: $("#pa-results"),
  odStatus: $("#od-status"), odCount: $("#od-count"), odResults: $("#od-results")
};

async function init() {
  try {
    const responses = await Promise.all(Object.values(CONFIG.FILES).map(f => fetch(CONFIG.DATA_DIR + f)));
    const data = await Promise.all(responses.map(r => {
      if(!r.ok) throw new Error(`Failed to load ${r.url}`);
      return r.json();
    }));
    
    [STATE.siteData, STATE.metadata, STATE.regions, STATE.sites, STATE.pressures, STATE.otherDesignations] = data;
    
    populateDropdowns();
    bindEvents();
  } catch (err) {
    console.error("Critical Load Error:", err);
    EL.paStatus.textContent = "Error loading data files.";
  }
}

function populateDropdowns() {
  if (!STATE.regions) return;
  const { UTA = [], SPC = [], SPE = [] } = STATE.regions;
  
  const fill = (el, items) => {
    while (el.options.length > 1) el.remove(1);
    items.forEach(i => el.add(new Option(i.name, i.id)));
  };

  fill(EL.ddUTA, UTA);
  fill(EL.ddSPC, SPC);
  fill(EL.ddSPE, SPE);
}

function bindEvents() {
  EL.btnSearch.onclick = () => performUnifiedSearch();
  EL.postcode.onkeypress = e => e.key === "Enter" && performUnifiedSearch();
  [EL.ddUTA, EL.ddSPC, EL.ddSPE].forEach(dd => {
    dd.onchange = () => performUnifiedFilter(dd);
  });
}

async function performUnifiedSearch() {
  const pc = EL.postcode.value.trim();
  if (!pc) return;
  
  setLoading(true);
  try {
    const resp = await fetch(`${CONFIG.MAPIT_BASE}/postcode/${pc}.json?api_key=${CONFIG.MAPIT_API_KEY}`);
    if (!resp.ok) throw new Error("Invalid postcode");
    const { wgs84_lat: lat, wgs84_lon: lon } = await resp.json();

    // 1. Protected Areas (Proximity)
    const paNearby = Object.keys(STATE.siteData).map(id => ({
      id, dist: haversine(lat, lon, STATE.siteData[id].lat, STATE.siteData[id].lng)
    })).filter(x => x.dist <= CONFIG.PROXIMITY_KM);
    renderPAResults(paNearby.sort((a,b) => a.dist - b.dist));

    // 2. Other Designations (Proximity)
    const odNearby = STATE.otherDesignations.features.map(f => {
      const center = getCentroid(f.geometry);
      return { ...f.properties, dist: haversine(lat, lon, center[1], center[0]) };
    }).filter(x => x.dist <= CONFIG.PROXIMITY_KM);
    renderODResults(odNearby.sort((a,b) => a.dist - b.dist));

  } catch (err) { alert(err.message); }
  setLoading(false);
}

async function performUnifiedFilter(dd) {
  [EL.ddUTA, EL.ddSPC, EL.ddSPE].forEach(el => { if (el !== dd) el.value = ""; });
  if (!dd.value) return;

  setLoading(true);
  try {
    // 1. Protected Areas (MapIt Intersection)
    const paResp = await fetch(`${CONFIG.MAPIT_BASE}/area/${dd.value}/intersects/8724?api_key=${CONFIG.MAPIT_API_KEY}`);
    const paIds = Object.keys(await paResp.json());
    renderPAResults(paIds.map(id => ({ id, dist: null })));

    // 2. Other Designations (Spatial Check)
    const geomResp = await fetch(`${CONFIG.MAPIT_BASE}/area/${dd.value}/geometry?api_key=${CONFIG.MAPIT_API_KEY}`);
    const areaGeom = await geomResp.json();
    const odInside = STATE.otherDesignations.features
      .filter(f => isPointInPolygon(getCentroid(f.geometry), areaGeom))
      .map(f => ({ ...f.properties, dist: null }));
    renderODResults(odInside);
  } catch (err) { console.error(err); }
  setLoading(false);
}

function renderPAResults(sites) {
  EL.paStatus.textContent = sites.length ? "Nearby Protected Areas" : "No sites found";
  EL.paCount.textContent = `${sites.length} sites`;
  EL.paResults.innerHTML = sites.map(s => {
    const m = STATE.metadata[s.id];
    if(!m) return "";
    return `
      <div class="site-row" onclick="toggleDetail(this, '${s.id}')">
        <div class="site-header">
          <div class="site-name">${esc(m.name)} <span class="desig-tag">${m.designation}</span></div>
          ${s.dist ? `<div class="site-distance">${s.dist.toFixed(1)} km</div>` : ''}
          <div class="site-condition-summary ${condClass(m.summary_condition)}">${m.summary_condition || 'Unknown'}</div>
        </div>
        <div class="site-detail">Loading details...</div>
      </div>`;
  }).join("");
}

function renderODResults(sites) {
  EL.odStatus.textContent = sites.length ? "Other Nature Designations" : "No other designations found";
  EL.odCount.textContent = `${sites.length} sites`;
  EL.odResults.innerHTML = sites.map(s => `
    <div class="site-row">
      <div class="site-header">
        <div class="site-name">${esc(s.name || s.NAME)} <span class="desig-tag">${s.designation_type || 'Designation'}</span></div>
        ${s.dist ? `<div class="site-distance">${s.dist.toFixed(1)} km</div>` : ''}
        ${s.link || s.LINK ? `<a href="${s.link || s.LINK}" target="_blank" class="desig-tag" style="text-decoration:none">Site Info ↗</a>` : ''}
      </div>
    </div>`).join("");
}

function toggleDetail(row, id) {
  const detail = row.querySelector(".site-detail");
  const isOpen = row.classList.toggle("open");
  if (isOpen) {
    const f = STATE.sites[id] || [], p = STATE.pressures[id] || [];
    detail.innerHTML = `
      <div class="detail-grid">
        <div><span class="detail-label">Monitored Features</span>
          <table><thead><tr><th>Feature</th><th>Condition</th></tr></thead>
          <tbody>${f.map(x=>`<tr><td>${esc(x.feature_name)}</td><td><span class="site-condition-summary ${condClass(x.condition)}">${esc(x.condition)}</span></td></tr>`).join("")}</tbody></table>
        </div>
        <div><span class="detail-label">Pressures</span>
          <table><thead><tr><th>Pressure Name</th></tr></thead>
          <tbody>${p.length ? p.map(x=>`<tr><td>${esc(x.pressure_name)}</td></tr>`).join("") : '<tr><td>None identified</td></tr>'}</tbody></table>
        </div>
      </div>`;
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getCentroid(g) { 
  if (g.type === "Point") return g.coordinates;
  const coords = g.type === "Polygon" ? g.coordinates[0][0] : g.coordinates[0][0][0]; 
  return coords;
}

function isPointInPolygon(pt, poly) {
  const x = pt[0], y = pt[1]; let inside = false;
  const rings = poly.type === "MultiPolygon" ? poly.coordinates.flat() : poly.coordinates;
  rings.forEach(ring => {
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
  });
  return inside;
}

function setLoading(a) { EL.paStatus.innerHTML = a ? `<span class="spinner"></span> Querying MapIt...` : ""; }

function condClass(cond) {
  const c = (cond || "").toLowerCase();
  if (c.includes("favourable") && !c.includes("unfavourable")) return "cond-fav";
  if (c.includes("recovering")) return "cond-unfav-rec";
  if (c.includes("declining")) return "cond-unfav-dec";
  if (c.includes("unfavourable")) return "cond-unfav";
  return "cond-unknown";
}

function esc(s) { 
  const d = document.createElement('div'); 
  d.textContent = s; 
  return d.innerHTML; 
}

init();
</script>
</body>
</html>
