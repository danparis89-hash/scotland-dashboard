<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scottish Protected Areas — Environmental Pressures</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a0a;--paper:#f5f2eb;--accent:#d63030;--accent-light:#fbe8e8;
  --mid:#6b6b6b;--rule:#c8c3b8;--field-bg:#fff;--field-border:#a8a49a;
  --success:#1a7a3a;--success-light:#e8f5ec;--warning:#b85c00;--warning-light:#fef3e5;
  --unfav:#9e3a00;--unfav-light:#fef0e8;--unfav-decline:#d63030;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --sans:'Söhne','Helvetica Neue','Arial',sans-serif;
  --display:'Georgia','Times New Roman',serif;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}

.frame{max-width:1120px;margin:0 auto;padding:2rem 2rem 4rem}
.masthead{display:flex;align-items:baseline;gap:1rem;padding-bottom:.75rem;border-bottom:3px solid var(--ink);margin-bottom:2rem}
.masthead-title{font-family:var(--display);font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
.masthead-sub{font-size:.75rem;color:var(--mid);text-transform:uppercase;letter-spacing:.12em}

/* ── Controls ── */
.controls{display:grid;grid-template-columns:220px auto 1fr 1fr 1fr;gap:1rem;align-items:end;margin-bottom:2rem}
.field-group{display:flex;flex-direction:column;gap:.25rem}
.field-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);font-weight:600}
.field-row{display:flex;gap:0}
.field-input{font-family:var(--mono);font-size:.85rem;padding:.55rem .75rem;border:2px solid var(--field-border);background:var(--field-bg);color:var(--ink);outline:none;width:100%;transition:border-color .15s}
.field-input:focus{border-color:var(--ink)}
.field-input::placeholder{color:var(--rule);font-style:italic}
.btn-search{font-family:var(--sans);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:.55rem 1.2rem;border:2px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-search:hover{background:var(--accent);border-color:var(--accent)}
select.field-input{font-family:var(--sans);font-size:.8rem;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6b6b' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right .75rem center;padding-right:2rem}

.divider{border:none;border-top:1px solid var(--rule);margin:0 0 1.5rem}

/* ── Status ── */
.status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;min-height:1.5rem}
.status-text{font-size:.75rem;color:var(--mid);font-family:var(--mono)}
.status-text[data-state="error"]{color:var(--accent)}
.status-text[data-state="success"]{color:var(--success)}
.status-text[data-state="loading"]{color:var(--warning)}
.status-count{font-size:.7rem;font-family:var(--mono);color:var(--mid)}

/* ── Site Cards ── */
.site-list{display:flex;flex-direction:column;gap:2px}
.site-row{border:1px solid var(--rule);background:var(--field-bg);cursor:pointer;transition:border-color .1s}
.site-row:hover{border-color:var(--ink)}
.site-header{display:grid;grid-template-columns:1fr auto auto auto;gap:1.5rem;align-items:center;padding:.65rem 1rem}
.site-name{font-weight:700;font-size:.85rem}
.site-name .site-designations{font-weight:400;margin-left:.4rem;display:inline}
.desig-tag{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.1rem .35rem;margin-left:.25rem;background:#edeae3;color:var(--mid);border:1px solid var(--rule);vertical-align:middle}
.site-name .site-distance{font-family:var(--mono);font-weight:400;color:var(--mid);margin-left:.5rem;font-size:.7rem}
.site-meta{font-size:.7rem;color:var(--mid);text-align:right;white-space:nowrap}
.site-condition-summary{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.15rem .5rem;white-space:nowrap}

/* Condition colours */
.cond-fav{background:var(--success-light);color:var(--success)}
.cond-unfav-rec{background:var(--warning-light);color:var(--warning)}
.cond-unfav{background:var(--unfav-light);color:var(--unfav)}
.cond-unfav-dec{background:var(--accent-light);color:var(--unfav-decline)}
.cond-unknown{background:#f0f0ec;color:var(--mid)}

.site-expand-icon{font-size:.7rem;color:var(--mid);transition:transform .15s;width:1.2rem;text-align:center}
.site-row.open .site-expand-icon{transform:rotate(90deg)}

/* ── Headline summary panel ── */
.summary-panel{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;padding:1rem 1.25rem;border:1px solid var(--rule);background:var(--field-bg)}
.summary-section h3{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);margin-bottom:.5rem;font-weight:700}
.condition-bars{display:flex;flex-direction:column;gap:.35rem}
.cond-bar-row{display:flex;align-items:center;gap:.5rem;font-size:.7rem}
.cond-bar-label{width:10rem;text-align:right;font-weight:600;font-size:.65rem}
.cond-bar-track{flex:1;height:.65rem;background:#f0f0ec;position:relative;overflow:hidden}
.cond-bar-fill{height:100%;position:absolute;left:0;top:0}
.cond-bar-count{width:3rem;font-family:var(--mono);font-size:.65rem;color:var(--mid)}
.pressure-rank{display:flex;flex-direction:column;gap:.3rem}
.pressure-rank-item{display:flex;align-items:center;gap:.5rem;font-size:.7rem}
.pressure-rank-bar{flex:1;height:.65rem;background:#f0f0ec;position:relative;overflow:hidden}
.pressure-rank-fill{height:100%;background:var(--accent);opacity:.55;position:absolute;left:0;top:0}
.pressure-rank-name{width:12rem;text-align:right;font-size:.65rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pressure-rank-count{width:2.5rem;font-family:var(--mono);font-size:.65rem;color:var(--mid)}
@media(max-width:700px){.summary-panel{grid-template-columns:1fr}.cond-bar-label,.pressure-rank-name{width:7rem}}

/* ── Feature detail (collapsed by default) ── */
.site-detail{display:none;border-top:1px solid var(--rule);padding:.75rem 1rem}
.site-row.open .site-detail{display:block}

.feature-table{width:100%;border-collapse:collapse;font-size:.75rem}
.feature-table th{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--mid);padding:.4rem .5rem;text-align:left;border-bottom:2px solid var(--rule)}
.feature-table td{padding:.4rem .5rem;border-bottom:1px solid var(--rule);vertical-align:top}
.feature-table tbody tr:hover{background:var(--accent-light)}

.cond-tag{display:inline-block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.1rem .4rem}
.pressure-list{font-size:.7rem;color:var(--ink);line-height:1.6}
.pressure-item{display:inline-block;background:#f0f0ec;padding:.1rem .4rem;margin:.1rem .2rem .1rem 0;font-size:.65rem}
.pressure-item .kw{color:var(--accent);margin-left:.2rem}
.effect-neg{border-left:2px solid var(--accent);padding-left:.3rem}
.effect-pos{border-left:2px solid var(--success);padding-left:.3rem}
.no-pressures{color:var(--mid);font-style:italic;font-size:.7rem}

.sitelink-link{font-size:.65rem;color:var(--mid);text-decoration:underline;text-underline-offset:2px}

/* ── Empty/Loading ── */
.state-message{text-align:center;padding:4rem 2rem;color:var(--mid)}
.state-message p{font-size:.85rem;max-width:36ch;margin:0 auto;line-height:1.6}
.state-message .state-icon{font-size:2rem;margin-bottom:.75rem;display:block;opacity:.4}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--rule);border-top-color:var(--ink);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:.5rem}

/* ── Footer ── */
.colophon{margin-top:3rem;padding-top:.75rem;border-top:1px solid var(--rule);font-size:.65rem;color:var(--mid);display:flex;justify-content:space-between}
.colophon a{color:var(--mid);text-decoration:underline;text-underline-offset:2px}

/* ── Responsive ── */
@media(max-width:900px){.controls{grid-template-columns:1fr 1fr}.controls .field-group:first-child{grid-column:1/-1}}
@media(max-width:600px){.frame{padding:1rem}.controls{grid-template-columns:1fr}.masthead{flex-direction:column;gap:.25rem}.site-header{grid-template-columns:1fr auto;gap:.5rem}.site-meta{display:none}}
</style>
</head>
<body>
<div class="frame">

  <header class="masthead">
    <h1 class="masthead-title">Scottish Protected Areas</h1>
    <span class="masthead-sub">Environmental Pressures Dashboard</span>
  </header>

  <div class="controls">
    <div class="field-group">
      <label class="field-label" for="postcode">Postcode</label>
      <div class="field-row">
        <input type="text" id="postcode" class="field-input" placeholder="e.g. EH1 1RF" autocomplete="postal-code" spellcheck="false">
        <button class="btn-search" id="btn-search">Search</button>
      </div>
    </div>
    <div class="field-group" style="align-self:end">
      <span class="field-label" style="color:var(--rule)">or filter by</span>
      <div style="height:2px;background:var(--rule);margin-top:auto"></div>
    </div>
    <div class="field-group">
      <label class="field-label" for="dd-uta">Local Authority</label>
      <select id="dd-uta" class="field-input"><option value="">— All —</option></select>
    </div>
    <div class="field-group">
      <label class="field-label" for="dd-spc">Constituency</label>
      <select id="dd-spc" class="field-input"><option value="">— All —</option></select>
    </div>
    <div class="field-group">
      <label class="field-label" for="dd-spe">Region</label>
      <select id="dd-spe" class="field-input"><option value="">— All —</option></select>
    </div>
  </div>

  <hr class="divider">

  <div class="status-bar">
    <span class="status-text" id="status"></span>
    <span class="status-count" id="count"></span>
  </div>

  <div id="results">
    <div class="state-message" id="empty-state">
      <span class="state-icon">⌖</span>
      <p>Enter a Scottish postcode to find protected areas within 10km, or select a region to view all sites.</p>
    </div>
  </div>

  <footer class="colophon">
    <span>Data: NatureScot SiteLink &amp; SCM. Boundaries: <a href="https://mapit.mysociety.org" target="_blank" rel="noopener">Powered by MapIt</a>.</span>
  </footer>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════ */
const CONFIG = {
  MAPIT_API_KEY: "ELNTpDEh11ZUqJUj21zLAmKSWsBOCVSiSniMPIu6",
  MAPIT_BASE: "https://mapit.mysociety.org",
  DATA_DIR: "data/",
  FILES: { siteData: "site_data.json", metadata: "metadata.json", regions: "regions.json", sites: "sites.json" },
  PROXIMITY_KM: 10,
};

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const STATE = { siteData: null, metadata: null, regions: null, sites: null, lastQuery: null };

const $ = s => document.querySelector(s);
const EL = {
  postcode: $("#postcode"), btnSearch: $("#btn-search"),
  ddUTA: $("#dd-uta"), ddSPC: $("#dd-spc"), ddSPE: $("#dd-spe"),
  status: $("#status"), count: $("#count"), results: $("#results"),
};

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  setStatus("loading", "Loading data…");
  try {
    const [siteData, metadata, regions, sites] = await Promise.all([
      fetchJSON(CONFIG.DATA_DIR + CONFIG.FILES.siteData),
      fetchJSON(CONFIG.DATA_DIR + CONFIG.FILES.metadata),
      fetchJSON(CONFIG.DATA_DIR + CONFIG.FILES.regions),
      fetchJSON(CONFIG.DATA_DIR + CONFIG.FILES.sites),
    ]);
    STATE.siteData = siteData; STATE.metadata = metadata;
    STATE.regions = regions; STATE.sites = sites;
    populateDropdowns(); bindEvents(); setStatus("", "");
  } catch (err) {
    setStatus("error", `Failed to load data: ${err.message}`);
  }
}

async function fetchJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status} loading ${path}`);
  return r.json();
}

/* ═══════════════════════════════════════════════════════════
   DROPDOWNS
   ═══════════════════════════════════════════════════════════ */
function populateDropdowns() {
  const { UTA = [], SPC = [], SPE = [] } = STATE.regions;
  fillSelect(EL.ddUTA, UTA); fillSelect(EL.ddSPC, SPC); fillSelect(EL.ddSPE, SPE);
}
function fillSelect(el, items) {
  while (el.options.length > 1) el.remove(1);
  for (const item of items) {
    const opt = document.createElement("option");
    opt.value = item.id; opt.textContent = item.name; el.appendChild(opt);
  }
}

/* ═══════════════════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════════════════ */
function bindEvents() {
  EL.btnSearch.addEventListener("click", handlePostcodeSearch);
  EL.postcode.addEventListener("keydown", e => { if (e.key === "Enter") handlePostcodeSearch(); });
  EL.postcode.addEventListener("input", () => {
    if (EL.postcode.value.trim()) { EL.ddUTA.value = ""; EL.ddSPC.value = ""; EL.ddSPE.value = ""; }
  });
  const allDropdowns = [EL.ddUTA, EL.ddSPC, EL.ddSPE];
  for (const dd of allDropdowns) {
    dd.addEventListener("change", () => {
      EL.postcode.value = "";
      // Reset the other dropdowns so only one filter is active
      for (const other of allDropdowns) { if (other !== dd) other.value = ""; }
      handleDropdownFilter();
    });
  }
}

/* ═══════════════════════════════════════════════════════════
   POSTCODE → PROXIMITY SEARCH
   ═══════════════════════════════════════════════════════════ */
async function handlePostcodeSearch() {
  const raw = EL.postcode.value.trim();
  if (!raw) return;
  const pc = raw.replace(/\s+/g, "").toUpperCase();
  if (pc.length < 5 || pc.length > 7) { setStatus("error", "Invalid postcode format."); return; }

  setStatus("loading", "Looking up postcode…");
  try {
    const url = `${CONFIG.MAPIT_BASE}/postcode/${encodeURIComponent(pc)}.json`;
    const resp = await fetch(url, { headers: { "X-Api-Key": CONFIG.MAPIT_API_KEY } });

    if (resp.status === 404 || resp.status === 400) {
      setStatus("error", `Postcode "${raw}" not found.`); clearResults(); return;
    }
    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      throw new Error(body.error || `MapIt returned HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const lat = data.wgs84_lat; const lng = data.wgs84_lon;

    if (!lat || !lng) { setStatus("error", "Could not determine coordinates for this postcode."); clearResults(); return; }

    // Find all sites within PROXIMITY_KM
    const nearby = [];
    for (const [paCode, info] of Object.entries(STATE.sites)) {
      if (!info.lat || !info.lng) continue;
      const dist = haversine(lat, lng, info.lat, info.lng);
      if (dist <= CONFIG.PROXIMITY_KM) {
        nearby.push({ paCode, dist: Math.round(dist * 10) / 10 });
      }
    }

    nearby.sort((a, b) => a.dist - b.dist);
    STATE.lastQuery = `${raw.toUpperCase()} — ${nearby.length} sites within ${CONFIG.PROXIMITY_KM}km`;
    renderSites(nearby, true);

  } catch (err) {
    if (err.message.includes("Usage limit")) setStatus("error", "MapIt API quota exceeded.");
    else setStatus("error", err.message);
  }
}

/* ═══════════════════════════════════════════════════════════
   DROPDOWN → REGIONAL FILTER
   ═══════════════════════════════════════════════════════════ */
function handleDropdownFilter() {
  const selectedIds = []; const labels = [];
  for (const dd of [EL.ddUTA, EL.ddSPC, EL.ddSPE]) {
    if (dd.value) {
      selectedIds.push(dd.value);
      labels.push(dd.options[dd.selectedIndex].textContent);
    }
  }
  if (!selectedIds.length) { clearResults(); setStatus("", ""); return; }

  const siteSet = new Set();
  for (const areaId of selectedIds) {
    (STATE.metadata[areaId] || []).forEach(s => siteSet.add(s));
  }

  const sitesArr = [...siteSet].map(paCode => ({ paCode, dist: null }));
  STATE.lastQuery = labels.join(" + ");
  renderSites(sitesArr, false);
}

/* ═══════════════════════════════════════════════════════════
   RENDERING
   ═══════════════════════════════════════════════════════════ */
function renderSites(sitesArr, showDistance) {
  if (!sitesArr.length) {
    setStatus("error", "No protected areas found.");
    clearResults(); return;
  }

  // Build per-entry cards
  const rawCards = [];
  for (const { paCode, dist } of sitesArr) {
    const sd = STATE.siteData[paCode];
    if (!sd) continue;

    const desigObj = sd.designation || {};
    const desigCode = desigObj.code || "";

    rawCards.push({
      paCode, dist, name: sd.name || "Unknown",
      designations: desigCode ? [desigCode] : [],
      area: sd.area || 0,
      localAuthority: sd.localAuthority || "",
      url: sd.url || "",
      features: sd.features || [],
    });
  }

  // Merge entries that share the same site name + local authority
  const mergeKey = c => `${c.name}\0${c.localAuthority}`;
  const merged = new Map();
  for (const c of rawCards) {
    const key = mergeKey(c);
    if (merged.has(key)) {
      const existing = merged.get(key);
      // Add new designation codes (no duplicates)
      for (const d of c.designations) {
        if (!existing.designations.includes(d)) existing.designations.push(d);
      }
      // Use largest area
      if (c.area > existing.area) existing.area = c.area;
      // Keep closest distance
      if (c.dist !== null && (existing.dist === null || c.dist < existing.dist)) existing.dist = c.dist;
      // Merge features, avoiding duplicates by name+category
      const existingFeatureKeys = new Set(existing.features.map(f => `${f.name}\0${f.category}`));
      for (const f of c.features) {
        if (!existingFeatureKeys.has(`${f.name}\0${f.category}`)) {
          existing.features.push(f);
          existingFeatureKeys.add(`${f.name}\0${f.category}`);
        }
      }
      // Keep first URL if current is empty
      if (!existing.url && c.url) existing.url = c.url;
    } else {
      merged.set(key, { ...c, designations: [...c.designations], features: [...c.features] });
    }
  }

  // Build final cards with computed summaries
  const cards = [];
  for (const c of merged.values()) {
    const pressureNames = new Set();
    c.features.forEach(f => (f.pressures || []).forEach(p => pressureNames.add(p.name)));
    cards.push({
      ...c,
      worstCondition: getWorstCondition(c.features),
      pressureCount: pressureNames.size,
      featureCount: c.features.length,
    });
  }

  if (!cards.length) {
    setStatus("error", "Sites found but no matching data available.");
    clearResults(); return;
  }

  setStatus("success", STATE.lastQuery || "");
  EL.count.textContent = `${cards.length} sites`;

  let html = renderSummaryPanel(cards);
  html += '<div class="site-list">';
  for (const c of cards) {
    const distStr = c.dist !== null ? `<span class="site-distance">${c.dist} km</span>` : "";
    const condClass = conditionClass(c.worstCondition);
    const condLabel = c.worstCondition || "Not assessed";
    const areaStr = c.area ? `${Math.round(c.area)} ha` : "";
    const desigHtml = c.designations.map(d => `<span class="desig-tag">${esc(d)}</span>`).join("");

    html += `<div class="site-row" data-pa="${esc(c.paCode)}">
      <div class="site-header">
        <div class="site-name">${esc(c.name)}<span class="site-designations">${desigHtml}</span>${distStr}</div>
        <div class="site-meta">${esc(areaStr)}</div>
        <div class="site-condition-summary ${condClass}">${esc(condLabel)}</div>
        <div class="site-expand-icon">▶</div>
      </div>
      <div class="site-detail">${renderFeatureTable(c)}</div>
    </div>`;
  }
  html += '</div>';
  EL.results.innerHTML = html;

  // Bind expand/collapse
  EL.results.querySelectorAll(".site-row").forEach(row => {
    row.querySelector(".site-header").addEventListener("click", () => row.classList.toggle("open"));
  });
}

function renderFeatureTable(card) {
  const { features, url, localAuthority } = card;
  let meta = "";
  if (localAuthority) meta += `<span>${esc(localAuthority)}</span>`;
  if (url) meta += `${meta ? " · " : ""}<a class="sitelink-link" href="${esc(url)}" target="_blank" rel="noopener">View on SiteLink</a>`;
  if (meta) meta = `<div style="margin-bottom:.5rem;font-size:.7rem;color:var(--mid)">${meta}</div>`;

  if (!features.length) return meta + '<div class="no-pressures">No features recorded.</div>';

  let table = meta + `<table class="feature-table"><thead><tr>
    <th>Feature</th><th>Category</th><th>Condition</th><th>Assessed</th><th>Pressures</th>
  </tr></thead><tbody>`;

  for (const f of features) {
    const cClass = conditionClass(f.conditionSummary || "");
    const pressuresHtml = (f.pressures || []).length
      ? (f.pressures || []).map(p => {
          const effectClass = (p.effect || "").toLowerCase().includes("negative") ? "effect-neg" : (p.effect || "").toLowerCase().includes("positive") ? "effect-pos" : "";
          const kw = p.keyword ? `<span class="kw">${esc(p.keyword)}</span>` : "";
          return `<span class="pressure-item ${effectClass}">${esc(p.name)}${kw}</span>`;
        }).join("")
      : '<span class="no-pressures">None recorded</span>';

    table += `<tr>
      <td>${esc(f.name || "—")}</td>
      <td>${esc(f.category || "—")}</td>
      <td><span class="cond-tag ${cClass}">${esc(f.condition || f.conditionSummary || "—")}</span></td>
      <td>${esc(f.lastAssessed || "—")}</td>
      <td class="pressure-list">${pressuresHtml}</td>
    </tr>`;
  }
  table += "</tbody></table>";
  return table;
}

/* ═══════════════════════════════════════════════════════════
   HEADLINE SUMMARY
   ═══════════════════════════════════════════════════════════ */
function renderSummaryPanel(cards) {
  // Aggregate conditions across all features in all cards
  const condCounts = { "Favourable": 0, "Unfavourable": 0, "Recovering": 0, "Not Assessed": 0 };
  const pressureCounts = {};
  let totalFeatures = 0;

  for (const c of cards) {
    for (const f of c.features) {
      totalFeatures++;
      const cs = f.conditionSummary || "Not Assessed";
      if (cs in condCounts) condCounts[cs]++;
      else condCounts["Not Assessed"]++;

      for (const p of (f.pressures || [])) {
        const name = p.name || "Unknown";
        pressureCounts[name] = (pressureCounts[name] || 0) + 1;
      }
    }
  }

  if (!totalFeatures) return "";

  // Condition bars
  const condColours = {
    "Favourable": "var(--success)", "Recovering": "var(--warning)",
    "Unfavourable": "var(--unfav)", "Not Assessed": "var(--mid)"
  };
  let condHtml = '<div class="condition-bars">';
  for (const [label, count] of Object.entries(condCounts)) {
    const pct = totalFeatures ? (count / totalFeatures * 100) : 0;
    condHtml += `<div class="cond-bar-row">
      <span class="cond-bar-label">${esc(label)}</span>
      <div class="cond-bar-track"><div class="cond-bar-fill" style="width:${pct.toFixed(1)}%;background:${condColours[label]}"></div></div>
      <span class="cond-bar-count">${count}</span>
    </div>`;
  }
  condHtml += '</div>';

  // Top pressures (up to 5)
  const topPressures = Object.entries(pressureCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxP = topPressures.length ? topPressures[0][1] : 1;
  let pressHtml = '<div class="pressure-rank">';
  for (const [name, count] of topPressures) {
    const pct = (count / maxP * 100);
    pressHtml += `<div class="pressure-rank-item">
      <span class="pressure-rank-name">${esc(name)}</span>
      <div class="pressure-rank-bar"><div class="pressure-rank-fill" style="width:${pct.toFixed(1)}%"></div></div>
      <span class="pressure-rank-count">${count}</span>
    </div>`;
  }
  pressHtml += '</div>';

  return `<div class="summary-panel">
    <div class="summary-section"><h3>Feature condition (${totalFeatures} features across ${cards.length} sites)</h3>${condHtml}</div>
    <div class="summary-section"><h3>Top pressures</h3>${pressHtml}</div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   CONDITION HELPERS
   ═══════════════════════════════════════════════════════════ */
function getWorstCondition(features) {
  const ranks = { "unfavourable": 4, "unfavourable declining": 5, "unfavourable no change": 4,
    "unfavourable recovering": 3, "favourable": 1, "not assessed": 0 };
  let worst = ""; let worstRank = -1;
  for (const f of features) {
    const s = (f.conditionSummary || "").toLowerCase();
    const d = (f.condition || "").toLowerCase();
    // Use detailed condition for ranking
    const rank = ranks[d] || ranks[s] || 0;
    if (rank > worstRank) { worstRank = rank; worst = f.conditionSummary || f.condition || ""; }
  }
  return worst;
}

function conditionClass(cond) {
  const c = (cond || "").toLowerCase();
  if (c.includes("favourable") && !c.includes("unfavourable")) return "cond-fav";
  if (c.includes("recovering")) return "cond-unfav-rec";
  if (c.includes("declining")) return "cond-unfav-dec";
  if (c.includes("unfavourable")) return "cond-unfav";
  return "cond-unknown";
}

/* ═══════════════════════════════════════════════════════════
   HAVERSINE
   ═══════════════════════════════════════════════════════════ */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setStatus(state, text) {
  EL.status.dataset.state = state;
  EL.status.innerHTML = state === "loading" ? `<span class="spinner"></span>${esc(text)}` : esc(text);
}
function clearResults() {
  EL.results.innerHTML = '<div class="state-message"><span class="state-icon">∅</span><p>No results to display.</p></div>';
  EL.count.textContent = "";
}
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

document.addEventListener("DOMContentLoaded", init);
